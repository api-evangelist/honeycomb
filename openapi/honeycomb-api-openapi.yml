components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Honeycomb-Team
      description: >-
        Honeycomb Configuration API key. Must have appropriate permissions for
        the endpoint being called.
  parameters:
    datasetSlug:
      name: datasetSlug
      in: path
      required: true
      description: >-
        The slug identifier for the dataset. Dataset names are case insensitive.
      schema:
        type: string
    columnId:
      name: columnId
      in: path
      required: true
      description: >-
        The unique identifier for the column.
      schema:
        type: string
    calculatedFieldId:
      name: calculatedFieldId
      in: path
      required: true
      description: >-
        The unique identifier for the calculated field.
      schema:
        type: string
    boardId:
      name: boardId
      in: path
      required: true
      description: >-
        The unique identifier for the board.
      schema:
        type: string
    markerId:
      name: markerId
      in: path
      required: true
      description: >-
        The unique identifier for the marker.
      schema:
        type: string
    markerSettingId:
      name: markerSettingId
      in: path
      required: true
      description: >-
        The unique identifier for the marker setting.
      schema:
        type: string
    triggerId:
      name: triggerId
      in: path
      required: true
      description: >-
        The unique identifier for the trigger.
      schema:
        type: string
    recipientId:
      name: recipientId
      in: path
      required: true
      description: >-
        The unique identifier for the recipient.
      schema:
        type: string
    sloId:
      name: sloId
      in: path
      required: true
      description: >-
        The unique identifier for the SLO.
      schema:
        type: string
    burnAlertId:
      name: burnAlertId
      in: path
      required: true
      description: >-
        The unique identifier for the burn alert.
      schema:
        type: string
    environmentId:
      name: environmentId
      in: path
      required: true
      description: >-
        The unique identifier for the environment.
      schema:
        type: string
    keyId:
      name: keyId
      in: path
      required: true
      description: >-
        The unique identifier for the API key.
      schema:
        type: string
    queryAnnotationId:
      name: queryAnnotationId
      in: path
      required: true
      description: >-
        The unique identifier for the query annotation.
      schema:
        type: string
  schemas:
    AuthInfo:
      type: object
      properties:
        team:
          type: object
          description: >-
            The team associated with the API key.
          properties:
            slug:
              type: string
              description: >-
                The slug identifier for the team.
            name:
              type: string
              description: >-
                The display name of the team.
        environment:
          type: object
          description: >-
            The environment associated with the API key, if applicable.
          properties:
            slug:
              type: string
              description: >-
                The slug identifier for the environment.
            name:
              type: string
              description: >-
                The display name of the environment.
    AuthPermissions:
      type: object
      properties:
        api_key_access:
          type: object
          description: >-
            The permissions and access levels granted to the API key.
          additionalProperties:
            type: boolean
    Dataset:
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of the dataset.
        slug:
          type: string
          description: >-
            The URL-safe slug identifier for the dataset.
        description:
          type: string
          description: >-
            A description of the dataset.
        created_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted timestamp of when the dataset was created.
        last_written_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted timestamp of the last event written to the dataset.
        regular_columns_count:
          type: integer
          description: >-
            The number of regular columns in the dataset.
    DatasetCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the dataset to create.
        description:
          type: string
          description: >-
            An optional description for the dataset.
    DatasetUpdateRequest:
      type: object
      properties:
        description:
          type: string
          description: >-
            An updated description for the dataset.
        expand_json_depth:
          type: integer
          description: >-
            The depth to which nested JSON payloads should be unpacked into
            individual columns.
    DatasetDefinition:
      type: object
      properties:
        duration_ms:
          type: string
          description: >-
            The column name that represents duration in milliseconds.
        error:
          type: string
          description: >-
            The column name that represents errors.
        name:
          type: string
          description: >-
            The column name that represents the event name.
        parent_id:
          type: string
          description: >-
            The column name used for parent span ID in tracing.
        route:
          type: string
          description: >-
            The column name that represents the route.
        service_name:
          type: string
          description: >-
            The column name that represents the service name.
        span_id:
          type: string
          description: >-
            The column name used for span ID in tracing.
        trace_id:
          type: string
          description: >-
            The column name used for trace ID in tracing.
        user:
          type: string
          description: >-
            The column name that represents the user.
    Column:
      type: object
      properties:
        id:
          type: string
          description: >-
            Unique identifier for the column.
        key_name:
          type: string
          description: >-
            The name of the column.
        type:
          type: string
          description: >-
            The data type of the column.
          enum:
            - string
            - float
            - integer
            - boolean
        description:
          type: string
          description: >-
            A description of the column.
        hidden:
          type: boolean
          description: >-
            If true, the column is excluded from autocomplete and raw data field
            lists.
        created_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the column was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the column was last updated.
        last_written:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the column last received event data.
    ColumnCreateRequest:
      type: object
      required:
        - key_name
      properties:
        key_name:
          type: string
          description: >-
            The name for the new column.
        type:
          type: string
          description: >-
            The data type for the column.
          enum:
            - string
            - float
            - integer
            - boolean
        description:
          type: string
          description: >-
            An optional description for the column.
        hidden:
          type: boolean
          description: >-
            If true, hides the column from autocomplete and raw data field lists.
    ColumnUpdateRequest:
      type: object
      properties:
        description:
          type: string
          description: >-
            An updated description for the column.
        type:
          type: string
          description: >-
            An updated data type for the column.
          enum:
            - string
            - float
            - integer
            - boolean
        hidden:
          type: boolean
          description: >-
            If true, hides the column from autocomplete and raw data field lists.
    CalculatedField:
      type: object
      properties:
        id:
          type: string
          description: >-
            Unique identifier for the calculated field.
        alias:
          type: string
          description: >-
            The alias name used to reference this calculated field in queries.
        expression:
          type: string
          description: >-
            The expression used to compute the calculated field value.
        description:
          type: string
          description: >-
            A description of the calculated field.
        created_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the calculated field was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the calculated field was last updated.
    CalculatedFieldCreateRequest:
      type: object
      required:
        - alias
        - expression
      properties:
        alias:
          type: string
          description: >-
            The alias name for the calculated field.
        expression:
          type: string
          description: >-
            The expression to compute the field value.
        description:
          type: string
          description: >-
            An optional description for the calculated field.
    CalculatedFieldUpdateRequest:
      type: object
      properties:
        expression:
          type: string
          description: >-
            An updated expression for the calculated field.
        description:
          type: string
          description: >-
            An updated description for the calculated field.
    Board:
      type: object
      properties:
        id:
          type: string
          description: >-
            Unique identifier for the board.
        name:
          type: string
          description: >-
            The display name of the board.
        description:
          type: string
          description: >-
            A description of the board.
        style:
          type: string
          description: >-
            The visual layout style of the board.
          enum:
            - list
            - visual
        column_layout:
          type: string
          description: >-
            The column layout for the board's visual mode.
          enum:
            - multi
            - single
        queries:
          type: array
          description: >-
            The list of query objects displayed on the board.
          items:
            $ref: '#/components/schemas/BoardQuery'
        links:
          type: object
          description: >-
            Links related to the board.
          properties:
            board_url:
              type: string
              format: uri
              description: >-
                URL to view the board in the Honeycomb UI.
        created_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the board was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            ISO8601 formatted time the board was last updated.
    BoardQuery:
      type: object
      properties:
        query_id:
          type: string
          description: >-
            The ID of the query specification.
        dataset:
          type: string
          description: >-
            The dataset slug to run the query against.
        query_annotation_id:
          type: string
          description: >-
            The ID of an associated query annotation.
        caption:
          type: string
          description: >-
            A display caption for the query on the board.
        query_style:
          type: string
          description: >-
            The visualization style for the query.
          enum:
            - graph
            - table
            - combo
        graph_settings:
          type: object
          description: >-
            Settings for graph rendering.
